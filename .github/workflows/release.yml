name: Release to npm

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type to bump (major, minor, or patch)'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: 'package.json'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./packages/frontend
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: npm run build:frontend

      - name: Run backend tests
        run: npm test

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Bump version and push tag
        id: version
        run: |
          git config user.name "Ashish Merani"
          git config user.email "ashishmerani@users.noreply.github.com"
          NEW_VERSION=$(npm version ${{ github.event.inputs.version_type }} --no-git-tag-version)
          git add package.json package-lock.json
          git commit -m "chore: release ${NEW_VERSION}"
          git tag "${NEW_VERSION}"
          git push
          git push --tags
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npx npm@11.5.1 publish --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
