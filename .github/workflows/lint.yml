name: Run Lints

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify root and frontend versions match
        run: |
          ROOT=$(node -p "require('./package.json').version")
          FRONTEND=$(node -p "require('./packages/frontend/package.json').version")
          if [ "$ROOT" != "$FRONTEND" ]; then
            echo "::error::Version mismatch: root=$ROOT frontend=$FRONTEND"
            exit 1
          fi
          echo "✓ Versions in sync: $ROOT"

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: 'package.json'

      - name: Install dependencies
        run: npm ci

      - name: Run lints
        run: npm run lint
  lint-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: 'packages/frontend/package.json'

      - name: Install dependencies
        working-directory: ./packages/frontend
        run: npm ci

      - name: Run lints
        working-directory: ./packages/frontend
        run: npm run lint